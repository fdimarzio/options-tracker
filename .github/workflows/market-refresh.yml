name: Market Refresh

on:
  schedule:
    # Market refresh: every 5 min Mon-Fri 9:30-16:00 ET (13:30-20:00 UTC)
    - cron: '*/5 13-20 * * 1-5'
    # Token keeper: daily at 8am ET (12:00 UTC) — resets 7-day refresh token window
    - cron: '0 12 * * *'
    # ETrade pre-expiry renew: daily at 11:50pm ET (3:50 UTC) — before midnight expiry
    - cron: '50 3 * * *'
  workflow_dispatch:

jobs:
  refresh:
    if: github.event.schedule == '*/5 13-20 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Refresh quotes and chains
        run: |
          BASE_URL="https://options-tracker-five.vercel.app"
          SECRET="${{ secrets.CRON_SECRET }}"

          for i in 1 2 3 4; do
            echo "--- Refresh $i of 4 ---"
            curl -s -H "x-cron-secret: $SECRET" "$BASE_URL/api/market-refresh?force=1"
            echo ""

            if [ $i -eq 1 ]; then
              echo "Fetching chains..."
              curl -s -H "x-cron-secret: $SECRET" --max-time 15 "$BASE_URL/api/chain-refresh"
              echo ""
              echo "Checking for new transactions..."
              curl -s -H "x-cron-secret: $SECRET" --max-time 20 "$BASE_URL/api/auto-import"
              echo ""
            fi

            if [ $i -lt 4 ]; then sleep 60; fi
          done

  token-keeper:
    if: github.event.schedule == '0 12 * * *' || github.event.schedule == '50 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Keep Schwab refresh token alive
        run: |
          echo "Refreshing Schwab token via schwab-proxy..."
          # Fetching a simple AAPL quote forces schwab-proxy to validate + refresh
          # the access token and save it back to Supabase — no separate endpoint needed
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://options-tracker-five.vercel.app/api/schwab-proxy?path=/marketdata/v1/quotes&symbols=AAPL&fields=quote&x-cron-secret=${{ secrets.CRON_SECRET }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Token refresh failed! Manual re-auth may be required at:"
            echo "https://options-tracker-five.vercel.app/api/schwab-auth"
            exit 1
          fi
          echo "Token refreshed successfully."

      - name: Renew ETrade access token
        run: |
          echo "Renewing ETrade token..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://options-tracker-five.vercel.app/api/etrade?action=renew&secret=${{ secrets.CRON_SECRET }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" == "401" ]; then
            echo "WARNING: ETrade token expired — manual re-auth required at:"
            echo "https://options-tracker-five.vercel.app/api/etrade?action=auth"
            echo "A Pushover notification has been sent."
          fi
