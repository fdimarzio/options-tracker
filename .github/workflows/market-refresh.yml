name: Market Refresh

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Refresh quotes and chains
        run: |
          BASE_URL="https://options-tracker-five.vercel.app"
          SECRET="${{ secrets.CRON_SECRET }}"

          for i in 1 2 3 4; do
            echo "--- Refresh $i of 4 ---"
            curl -s -H "x-cron-secret: $SECRET" "$BASE_URL/api/market-refresh?force=1"
            echo ""

            if [ $i -eq 1 ]; then
              echo "Fetching chains..."
              curl -s -H "x-cron-secret: $SECRET" --max-time 55 "$BASE_URL/api/chain-refresh"
              echo ""
            fi

            if [ $i -lt 4 ]; then sleep 60; fi
          done
