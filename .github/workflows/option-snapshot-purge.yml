name: Option Snapshot Purge

on:
  schedule:
    - cron: '0 11 * * *'  # daily at 7am ET / 11:00 UTC, off market hours
  workflow_dispatch:        # manual trigger anytime

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run option_snapshots purge
        env:
          VITE_SUPABASE_URL: https://ufagnokxmetushstgrip.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: node scripts/option-snapshot-purge.js
